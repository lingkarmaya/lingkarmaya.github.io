<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bocil Pintar — Tempat Belajar Seru untuk Anak Indonesia!</title>
<meta name="description" content="Kumpulan aplikasi belajar gratis untuk anak Indonesia: matematika, catur, koding, dan menulis. Tanpa login, tanpa biaya!">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎈</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --langit-atas:#7ED4F5;
    --langit-bawah:#C9EEFF;
    --krem:#FFF9EC;
    --matahari:#FFD54F;
    --koral:#FF7E67;
    --hijau:#66BB6A;
    --ungu:#9575CD;
    --biru:#4FC3F7;
    --tinta:#3E3A5C;
    --putih:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Nunito',sans-serif;
    color:var(--tinta);
    background:linear-gradient(180deg,var(--langit-atas) 0%,var(--langit-bawah) 70%,var(--krem) 100%);
    overflow-x:hidden;
  }
  h1,h2,h3,.btn{font-family:'Fredoka',sans-serif;}

  /* ====== KERANGKA: desktop = 1 layar penuh, mobile = mengalir ====== */
  .layar{
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
  }

  /* ---------- HIASAN LANGIT ---------- */
  .matahari{
    position:absolute;top:3vh;right:6%;
    width:76px;height:76px;border-radius:50%;
    background:var(--matahari);
    box-shadow:0 0 0 14px rgba(255,213,79,.35),0 0 0 30px rgba(255,213,79,.15);
    animation:senyum 6s ease-in-out infinite;z-index:1;
  }
  .matahari::before,.matahari::after{
    content:"";position:absolute;top:26px;width:8px;height:12px;border-radius:50%;background:#8a6d1f;
  }
  .matahari::before{left:20px;}
  .matahari::after{right:20px;}
  .matahari .mulut{position:absolute;left:50%;top:46px;transform:translateX(-50%);width:28px;height:13px;border-radius:0 0 40px 40px;background:#8a6d1f;}
  @keyframes senyum{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}

  .awan{position:absolute;background:var(--putih);border-radius:60px;opacity:.9;animation:melayang linear infinite;z-index:0;}
  .awan::before,.awan::after{content:"";position:absolute;background:var(--putih);border-radius:50%;}
  .awan.a1{width:120px;height:38px;top:12vh;animation-duration:60s;}
  .awan.a1::before{width:50px;height:50px;top:-24px;left:20px;}
  .awan.a1::after{width:38px;height:38px;top:-16px;right:22px;}
  .awan.a2{width:90px;height:30px;top:30vh;animation-duration:80s;animation-delay:-40s;opacity:.7;}
  .awan.a2::before{width:38px;height:38px;top:-18px;left:14px;}
  .awan.a2::after{width:28px;height:28px;top:-12px;right:16px;}
  @keyframes melayang{from{left:-160px;}to{left:110%;}}

  /* ---------- HERO ---------- */
  .hero{
    text-align:center;
    padding:2.5vh 20px 1vh;
    position:relative;z-index:2;
    flex:0 0 auto;
  }
  .balon{display:inline-block;animation:naikturun 4.5s ease-in-out infinite;}
  .balon svg{width:clamp(78px,11vh,120px);height:auto;filter:drop-shadow(0 8px 12px rgba(62,58,92,.18));}
  @keyframes naikturun{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-14px) rotate(2deg);}}
  .hero h1{
    font-size:clamp(1.9rem,5vh,3.2rem);font-weight:700;margin-top:.4vh;
    text-shadow:0 3px 0 rgba(255,255,255,.7);line-height:1.05;
  }
  .hero h1 .b{color:var(--koral);}
  .hero h1 .p{color:var(--biru);filter:brightness(.85);}
  .hero .sub{
    max-width:560px;margin:.8vh auto 0;
    font-size:clamp(.9rem,1.9vh,1.15rem);font-weight:700;color:#4a5a76;
  }

  /* ---------- ISI / KARTU ---------- */
  .isi{
    flex:1 1 auto;
    display:flex;flex-direction:column;justify-content:center;
    padding:1vh 20px 2vh;
    position:relative;z-index:2;
    min-height:0;
  }
  .isi h2{text-align:center;font-size:clamp(1.2rem,2.6vh,1.7rem);margin-bottom:.5vh;}
  .garis-judul{
    width:110px;height:7px;margin:0 auto 2vh;border-radius:99px;
    background:repeating-linear-gradient(90deg,var(--koral) 0 18px,var(--matahari) 18px 36px,var(--biru) 36px 54px,var(--hijau) 54px 72px);
  }
  .grid{
    max-width:1100px;margin:0 auto;width:100%;
    display:grid;grid-template-columns:repeat(4,1fr);gap:20px;
  }
  .kartu{
    background:var(--putih);border-radius:22px;
    padding:2.2vh 16px 2vh;text-align:center;text-decoration:none;color:var(--tinta);
    border:4px solid transparent;box-shadow:0 8px 0 rgba(62,58,92,.08);
    transition:transform .18s ease;
    display:flex;flex-direction:column;align-items:center;
  }
  .kartu:hover{transform:translateY(-8px) rotate(-1.2deg);}
  .kartu:focus-visible{outline:4px solid var(--tinta);outline-offset:3px;}
  .kartu .maskot{
    width:clamp(56px,8vh,80px);height:clamp(56px,8vh,80px);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(1.8rem,4.2vh,2.5rem);margin-bottom:1vh;
    animation:goyang 3s ease-in-out infinite;
  }
  @keyframes goyang{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
  .kartu h3{font-size:clamp(1rem,2.1vh,1.3rem);font-weight:600;margin-bottom:.6vh;}
  .kartu p{font-size:clamp(.78rem,1.5vh,.92rem);font-weight:600;color:#6b6890;line-height:1.4;flex:1;}
  .kartu .main{
    margin-top:1.2vh;font-family:'Fredoka',sans-serif;font-weight:600;color:#fff;
    padding:.8vh 22px;border-radius:999px;font-size:clamp(.85rem,1.7vh,1rem);
  }

  /* ---------- FOOTER ---------- */
  .kaki{
    flex:0 0 auto;background:var(--hijau);color:#fff;text-align:center;
    padding:1.2vh 20px;position:relative;z-index:2;font-weight:700;font-size:clamp(.75rem,1.5vh,.9rem);
  }
  .kaki::before{
    content:"";position:absolute;top:-14px;left:0;right:0;height:16px;
    background:radial-gradient(circle at 12px 16px,var(--hijau) 16px,transparent 17px) repeat-x;
    background-size:32px 16px;
  }
  .kaki .emoji{font-size:1.1rem;letter-spacing:8px;}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
  }

  /* ================= MOBILE: biarkan scroll, tata vertikal ================= */
  @media (max-width:820px){
    .layar{min-height:100dvh;height:auto;overflow:visible;}
    .hero{padding:24px 20px 8px;}
    .hero h1{font-size:clamp(2.1rem,8vw,3rem);}
    .hero .sub{font-size:1.05rem;margin-top:12px;}
    .balon svg{width:110px;}
    .isi{padding:20px 20px 30px;justify-content:flex-start;}
    .isi h2{font-size:1.5rem;margin-bottom:6px;}
    .garis-judul{margin-bottom:22px;}
    .grid{grid-template-columns:repeat(2,1fr);gap:16px;}
    .kartu{padding:22px 14px 20px;}
    .kartu .maskot{width:70px;height:70px;font-size:2.1rem;margin-bottom:12px;}
    .kartu h3{font-size:1.15rem;}
    .kartu p{font-size:.85rem;}
    .kartu .main{padding:8px 20px;margin-top:14px;}
    .matahari{width:60px;height:60px;}
    .matahari::before,.matahari::after{top:20px;width:6px;height:9px;}
    .matahari::before{left:15px;}.matahari::after{right:15px;}
    .matahari .mulut{top:34px;width:22px;height:10px;}
    .kaki{padding:18px 20px;font-size:.85rem;}
  }
  @media (max-width:440px){
    .grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="layar">
  <div class="awan a1" aria-hidden="true"></div>
  <div class="awan a2" aria-hidden="true"></div>
  <div class="matahari" aria-hidden="true"><div class="mulut"></div></div>

  <header class="hero">
    <div class="balon" aria-hidden="true">
      <svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M80 8C42 8 18 40 18 76c0 34 30 56 44 74h36c14-18 44-40 44-74C142 40 118 8 80 8z" fill="#FF7E67"/>
        <path d="M80 8c-14 0-24 32-24 68 0 30 10 56 16 74h16c6-18 16-44 16-74 0-36-10-68-24-68z" fill="#FFD54F"/>
        <path d="M80 8C60 8 44 40 44 76c0 32 16 56 24 74h4C66 132 56 108 56 76 56 40 68 8 80 8z" fill="#4FC3F7" opacity=".9"/>
        <path d="M80 8c12 0 24 32 24 68 0 32-10 56-16 74h4c8-18 24-42 24-74 0-36-16-68-36-68z" fill="#66BB6A" opacity=".9"/>
        <line x1="62" y1="150" x2="66" y2="170" stroke="#8a6d1f" stroke-width="3"/>
        <line x1="98" y1="150" x2="94" y2="170" stroke="#8a6d1f" stroke-width="3"/>
        <rect x="58" y="168" width="44" height="28" rx="8" fill="#A1704B"/>
        <rect x="58" y="168" width="44" height="8" rx="4" fill="#7d5537"/>
        <text x="80" y="189" text-anchor="middle" font-size="14" font-family="Fredoka,sans-serif">😊</text>
      </svg>
    </div>
    <h1><span class="b">Bocil</span> <span class="p">Pintar</span></h1>
    <p class="sub">Tempat bermain sambil belajar untuk anak Indonesia — gratis, tanpa login, bisa di HP atau komputer! 🎉</p>
  </header>

  <main class="isi">
    <h2>Mau Belajar Apa Hari Ini?</h2>
    <div class="garis-judul" aria-hidden="true"></div>
    <div class="grid" id="gridAplikasi"><!-- dimuat dari links.json --></div>
  </main>

  <footer class="kaki">
    <div class="emoji" aria-hidden="true">🌻 🦋 🌈 🐞 🌼</div>
    Dibuat dengan ❤️ untuk semua anak Indonesia · © <span id="tahun"></span> bocilpintar.web.id
  </footer>
</div>

<script>
  document.getElementById('tahun').textContent = new Date().getFullYear();

  const CADANGAN = {"apps":[
    {"nama":"Matematika Ceria","emoji":"🔢","deskripsi":"Berhitung jadi seru! Latihan matematika kelas 1-6.","url":"https://bocilpintar.web.id/bocilpintar-matematika-ceria/","warna":"#FF7E67"},
    {"nama":"Catur Ceria","emoji":"♟️","deskripsi":"Belajar catur dari nol sampai jago!","url":"https://bocilpintar.web.id/bocilpintar-catur-ceria/","warna":"#9575CD"},
    {"nama":"Koding Interaktif","emoji":"🤖","deskripsi":"Bantu robot berjalan dengan menyusun perintah.","url":"https://bocilpintar.web.id/bocilpintar-koding-interaktif/","warna":"#4FC3F7"},
    {"nama":"Belajar Menulis","emoji":"✏️","deskripsi":"Latihan menulis huruf dan kata dengan seru!","url":"https://bocilpintar.web.id/bocilpintar-belajar-menulis/","warna":"#66BB6A"}
  ]};

  function urlAman(u){
    try{ const p=new URL(u,location.origin); return p.protocol==='https:'||p.protocol==='http:'; }
    catch(e){ return false; }
  }

  function tampilkan(data){
    const grid=document.getElementById('gridAplikasi');
    grid.innerHTML='';
    (data.apps||[]).forEach(app=>{
      if(!urlAman(app.url)) return;
      const a=document.createElement('a');
      a.className='kartu'; a.href=app.url;
      a.style.borderColor=app.warna||'#4FC3F7';
      const m=document.createElement('div');
      m.className='maskot'; m.style.background=(app.warna||'#4FC3F7')+'33'; m.textContent=app.emoji||'⭐';
      const h=document.createElement('h3'); h.textContent=app.nama||'Aplikasi';
      const p=document.createElement('p'); p.textContent=app.deskripsi||'';
      const b=document.createElement('span'); b.className='main'; b.style.background=app.warna||'#4FC3F7'; b.textContent='Main Yuk!';
      a.append(m,h,p,b); grid.appendChild(a);
    });
  }

  fetch('links.json',{cache:'no-store'})
    .then(r=>r.ok?r.json():Promise.reject())
    .then(tampilkan)
    .catch(()=>tampilkan(CADANGAN));
</script>

</body>
</html>
