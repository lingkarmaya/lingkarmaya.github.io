<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bocil Pintar — Tempat Belajar Seru untuk Anak Indonesia!</title>
<meta name="description" content="Kumpulan aplikasi belajar gratis untuk anak Indonesia: matematika, catur, koding, dan menulis. Tanpa login, tanpa biaya!">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎈</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --langit-atas:#7ED4F5;
    --langit-bawah:#C9EEFF;
    --krem:#FFF9EC;
    --matahari:#FFD54F;
    --koral:#FF7E67;
    --hijau:#66BB6A;
    --ungu:#9575CD;
    --biru:#4FC3F7;
    --tinta:#3E3A5C;
    --putih:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Nunito',sans-serif;
    color:var(--tinta);
    background:var(--krem);
    overflow-x:hidden;
  }
  h1,h2,h3,.btn{font-family:'Fredoka',sans-serif;}

  /* ---------- LANGIT / HERO ---------- */
  .langit{
    position:relative;
    background:linear-gradient(180deg,var(--langit-atas) 0%,var(--langit-bawah) 78%,var(--krem) 100%);
    padding:24px 20px 90px;
    text-align:center;
    overflow:hidden;
  }
  .matahari{
    position:absolute;top:36px;right:7%;
    width:92px;height:92px;border-radius:50%;
    background:var(--matahari);
    box-shadow:0 0 0 18px rgba(255,213,79,.35),0 0 0 38px rgba(255,213,79,.15);
    animation:senyum-matahari 6s ease-in-out infinite;
  }
  .matahari::before,.matahari::after{
    content:"";position:absolute;top:32px;width:10px;height:14px;border-radius:50%;background:#8a6d1f;
  }
  .matahari::before{left:24px;}
  .matahari::after{right:24px;}
  .matahari .mulut{
    position:absolute;left:50%;top:56px;transform:translateX(-50%);
    width:34px;height:16px;border-radius:0 0 40px 40px;background:#8a6d1f;
  }
  @keyframes senyum-matahari{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}

  .awan{
    position:absolute;background:var(--putih);border-radius:60px;opacity:.9;
    animation:melayang linear infinite;
  }
  .awan::before,.awan::after{content:"";position:absolute;background:var(--putih);border-radius:50%;}
  .awan.a1{width:130px;height:42px;top:70px;animation-duration:55s;}
  .awan.a1::before{width:56px;height:56px;top:-26px;left:22px;}
  .awan.a1::after{width:42px;height:42px;top:-18px;right:24px;}
  .awan.a2{width:95px;height:32px;top:180px;animation-duration:75s;animation-delay:-30s;opacity:.75;}
  .awan.a2::before{width:42px;height:42px;top:-20px;left:16px;}
  .awan.a2::after{width:30px;height:30px;top:-13px;right:18px;}
  .awan.a3{width:110px;height:36px;top:40px;animation-duration:65s;animation-delay:-50s;opacity:.8;}
  .awan.a3::before{width:48px;height:48px;top:-22px;left:20px;}
  .awan.a3::after{width:34px;height:34px;top:-15px;right:20px;}
  @keyframes melayang{from{left:-160px;}to{left:110%;}}

  .balon{
    display:inline-block;
    margin-top:8px;
    animation:naik-turun 4.5s ease-in-out infinite;
  }
  .balon svg{width:150px;height:auto;filter:drop-shadow(0 10px 14px rgba(62,58,92,.18));}
  @keyframes naik-turun{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-16px) rotate(2deg);}}

  .langit h1{
    font-size:clamp(2.2rem,7vw,3.6rem);
    font-weight:700;
    margin-top:6px;
    color:var(--tinta);
    text-shadow:0 3px 0 rgba(255,255,255,.7);
  }
  .langit h1 .b{color:var(--koral);}
  .langit h1 .p{color:var(--biru);filter:brightness(.85);}
  .langit p.sub{
    max-width:520px;margin:14px auto 0;
    font-size:clamp(1rem,3vw,1.2rem);font-weight:700;color:#4a5a76;
  }
  .btn-mulai{
    display:inline-block;margin-top:26px;
    background:var(--koral);color:#fff;text-decoration:none;
    font-size:1.25rem;font-weight:600;
    padding:14px 38px;border-radius:999px;
    box-shadow:0 6px 0 #d95c46;
    transition:transform .15s,box-shadow .15s;
  }
  .btn-mulai:hover{transform:translateY(-3px);box-shadow:0 9px 0 #d95c46;}
  .btn-mulai:active{transform:translateY(3px);box-shadow:0 2px 0 #d95c46;}

  /* ---------- KARTU APLIKASI ---------- */
  .aplikasi{
    max-width:1040px;margin:-40px auto 0;padding:0 20px 60px;
    position:relative;z-index:2;
  }
  .aplikasi h2{
    text-align:center;font-size:clamp(1.6rem,5vw,2.2rem);
    margin-bottom:8px;
  }
  .aplikasi .garis-judul{
    width:120px;height:8px;margin:0 auto 34px;border-radius:99px;
    background:repeating-linear-gradient(90deg,var(--koral) 0 20px,var(--matahari) 20px 40px,var(--biru) 40px 60px,var(--hijau) 60px 80px);
  }
  .grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:26px;
  }
  .kartu{
    background:var(--putih);
    border-radius:26px;
    padding:26px 22px 24px;
    text-align:center;text-decoration:none;color:var(--tinta);
    border:4px solid transparent;
    box-shadow:0 8px 0 rgba(62,58,92,.08);
    transition:transform .18s ease,box-shadow .18s ease;
    display:flex;flex-direction:column;align-items:center;
  }
  .kartu:hover{transform:translateY(-8px) rotate(-1.2deg);}
  .kartu:focus-visible{outline:4px solid var(--tinta);outline-offset:3px;}
  .kartu .maskot{
    width:86px;height:86px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:2.6rem;margin-bottom:14px;
    animation:goyang 3s ease-in-out infinite;
  }
  @keyframes goyang{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
  .kartu h3{font-size:1.35rem;font-weight:600;margin-bottom:8px;}
  .kartu p{font-size:.95rem;font-weight:600;color:#6b6890;line-height:1.5;flex:1;}
  .kartu .main{
    margin-top:16px;font-family:'Fredoka',sans-serif;font-weight:600;
    color:#fff;padding:9px 26px;border-radius:999px;font-size:1rem;
  }

  /* ---------- RUMPUT / FOOTER ---------- */
  .rumput{
    position:relative;background:var(--hijau);color:#fff;
    padding:60px 20px 30px;text-align:center;margin-top:20px;
  }
  .rumput::before{
    content:"";position:absolute;top:-24px;left:0;right:0;height:26px;
    background:
      radial-gradient(circle at 12px 26px, var(--hijau) 18px, transparent 19px) repeat-x;
    background-size:36px 26px;
  }
  .rumput p{font-weight:700;max-width:560px;margin:0 auto;}
  .rumput .kecil{font-size:.85rem;opacity:.85;margin-top:14px;font-weight:600;}
  .rumput .emoji-baris{font-size:1.6rem;letter-spacing:10px;margin-bottom:14px;}

  @media (prefers-reduced-motion:reduce){
    *,.awan,.balon,.matahari,.kartu .maskot{animation:none!important;transition:none!important;}
  }
  @media(max-width:520px){
    .matahari{width:64px;height:64px;right:4%;}
    .matahari::before,.matahari::after{top:22px;width:7px;height:10px;}
    .matahari::before{left:16px;}.matahari::after{right:16px;}
    .matahari .mulut{top:38px;width:24px;height:11px;}
    .balon svg{width:110px;}
  }
</style>
</head>
<body>

<header class="langit">
  <div class="awan a1"></div>
  <div class="awan a2"></div>
  <div class="awan a3"></div>
  <div class="matahari" aria-hidden="true"><div class="mulut"></div></div>

  <div class="balon" aria-hidden="true">
    <!-- Balon udara membawa logo -->
    <svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M80 8C42 8 18 40 18 76c0 34 30 56 44 74h36c14-18 44-40 44-74C142 40 118 8 80 8z" fill="#FF7E67"/>
      <path d="M80 8c-14 0-24 32-24 68 0 30 10 56 16 74h16c6-18 16-44 16-74 0-36-10-68-24-68z" fill="#FFD54F"/>
      <path d="M80 8C60 8 44 40 44 76c0 32 16 56 24 74h4C66 132 56 108 56 76 56 40 68 8 80 8z" fill="#4FC3F7" opacity=".9"/>
      <path d="M80 8c12 0 24 32 24 68 0 32-10 56-16 74h4c8-18 24-42 24-74 0-36-16-68-36-68z" fill="#66BB6A" opacity=".9"/>
      <line x1="62" y1="150" x2="66" y2="170" stroke="#8a6d1f" stroke-width="3"/>
      <line x1="98" y1="150" x2="94" y2="170" stroke="#8a6d1f" stroke-width="3"/>
      <rect x="58" y="168" width="44" height="28" rx="8" fill="#A1704B"/>
      <rect x="58" y="168" width="44" height="8" rx="4" fill="#7d5537"/>
      <text x="80" y="189" text-anchor="middle" font-size="14" font-family="Fredoka,sans-serif">😊</text>
    </svg>
  </div>

  <h1><span class="b">Bocil</span> <span class="p">Pintar</span></h1>
  <p class="sub">Tempat bermain sambil belajar untuk anak Indonesia — gratis, tanpa login, bisa di HP atau komputer! 🎉</p>
  <a class="btn-mulai" href="#aplikasi">Ayo Main! 🚀</a>
</header>

<main class="aplikasi" id="aplikasi">
  <h2>Mau Belajar Apa Hari Ini?</h2>
  <div class="garis-judul" aria-hidden="true"></div>
  <div class="grid" id="gridAplikasi">
    <!-- Kartu aplikasi dimuat dari links.json -->
  </div>
</main>

<footer class="rumput">
  <div class="emoji-baris" aria-hidden="true">🌻 🦋 🌈 🐞 🌼</div>
  <p>Bocil Pintar dibuat dengan ❤️ untuk semua anak Indonesia.<br>Belajar itu seru, dan seru itu gratis!</p>
  <p class="kecil">© <span id="tahun"></span> bocilpintar.web.id</p>
</footer>

<script>
  document.getElementById('tahun').textContent = new Date().getFullYear();

  // Data cadangan kalau links.json gagal dimuat
  const CADANGAN = {"apps":[
    {"nama":"Matematika Ceria","emoji":"🔢","deskripsi":"Berhitung jadi seru! Latihan matematika kelas 1-6 dengan misi harian dan lencana keren.","url":"https://bocilpintar.web.id/bocilpintar-matematika-ceria/","warna":"#FF7E67"},
    {"nama":"Catur Ceria","emoji":"♟️","deskripsi":"Belajar catur dari nol sampai jago! Main lawan komputer atau bareng teman.","url":"https://bocilpintar.web.id/bocilpintar-catur-ceria/","warna":"#9575CD"},
    {"nama":"Koding Interaktif","emoji":"🤖","deskripsi":"Bantu robot berjalan dengan menyusun perintah. Belajar logika koding sambil bermain!","url":"https://bocilpintar.web.id/bocilpintar-koding-interaktif/","warna":"#4FC3F7"},
    {"nama":"Belajar Menulis","emoji":"✏️","deskripsi":"Latihan menulis huruf dan kata dengan cara yang menyenangkan!","url":"https://bocilpintar.web.id/bocilpintar-belajar-menulis/","warna":"#66BB6A"}
  ]};

  // Pengaman: hanya izinkan link http/https
  function urlAman(u){
    try{ const p = new URL(u, location.origin); return p.protocol === 'https:' || p.protocol === 'http:'; }
    catch(e){ return false; }
  }

  function tampilkan(data){
    const grid = document.getElementById('gridAplikasi');
    grid.innerHTML = '';
    (data.apps || []).forEach(app=>{
      if(!urlAman(app.url)) return;
      const a = document.createElement('a');
      a.className = 'kartu';
      a.href = app.url;
      a.style.borderColor = app.warna || '#4FC3F7';

      const maskot = document.createElement('div');
      maskot.className = 'maskot';
      maskot.style.background = (app.warna || '#4FC3F7') + '33';
      maskot.textContent = app.emoji || '⭐';

      const judul = document.createElement('h3');
      judul.textContent = app.nama || 'Aplikasi';

      const desk = document.createElement('p');
      desk.textContent = app.deskripsi || '';

      const tombol = document.createElement('span');
      tombol.className = 'main';
      tombol.style.background = app.warna || '#4FC3F7';
      tombol.textContent = 'Main Yuk!';

      a.append(maskot, judul, desk, tombol);
      grid.appendChild(a);
    });
  }

  fetch('links.json', {cache:'no-store'})
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(tampilkan)
    .catch(()=> tampilkan(CADANGAN));
</script>

        async src="//gc.zgo.at/count.js"></script>

</body>
</html>
